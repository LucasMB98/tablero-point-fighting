<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LA ZONA POINT FIGHTING</title>
<style>
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { touch-action:manipulation; overscroll-behavior:none; }
  body { background:#111; color:#fff; font-family:Arial; margin:0; text-align:center; user-select:none; -webkit-user-select:none; }
.evento { font-size:4.5vw; background:#000; padding:12px 0; font-weight:900; letter-spacing:5px; border-bottom:4px solid #ffc107; }
.timer { font-size:9vw; background:#000; padding:5px; }
.timer.corriendo { background:#2e7d32; }
.timer.termino { background:#d32f2f; }
.container { display:flex; height:58vh; }
.jugador { flex:1; display:flex; flex-direction:column; justify-content:space-between; position:relative; padding:10px 0; }
  #rojo { background:#c62828; }
  #azul { background:#1565c0; }
.nombre { font-size:4vw; font-weight:900; text-shadow:0 0 8px rgba(0,0,0,0.8); }
.puntos { font-size:22vw; font-weight:900; line-height:1; text-shadow:0 0 20px rgba(0,0,0,0.7); -webkit-text-stroke:2px #000; }
.faltas-box { font-size:2.5vw; background:rgba(0,0,0,0.4); margin:0 8px; padding:12px; border-radius:10px; border:2px solid rgba(255,255,255,0.2); }
.faltas-box span { font-size:3.8vw; font-weight:900; text-shadow:0 0 8px rgba(0,0,0,0.9); }
.faltas-box.alerta { background:rgba(255,0,0,0.5); border:3px solid #ff5252; box-shadow:0 0 15px rgba(255,0,0,0.8); }
.botones-puntos button { font-size:3.5vw; padding:14px 22px; margin:5px; border:3px solid #000; border-radius:12px; cursor:pointer; font-weight:900; min-height:44px; }
.btn-suma { background:#fff; color:#000; }
.btn-suma:active { background:#e0e0e0; transform:scale(0.95); }
.btn-resta { background:#000; color:#fff; border-color:#fff; }
.btn-resta:active { background:#333; transform:scale(0.95); }
.botones-faltas { display:flex; justify-content:center; gap:8px; flex-wrap:nowrap; }
.botones-faltas button { font-size:2.6vw; padding:14px 6px; border:3px solid #000; border-radius:10px; cursor:pointer; flex:1; min-width:0; font-weight:900; min-height:44px; }
.btn-amarillo { background:#ffc107; color:#000; }
.btn-amarillo:active { background:#ffb300; transform:scale(0.95); }
.btn-gris { background:#616161; color:#fff; }
.btn-gris:active { background:#424242; transform:scale(0.95); }
.controles { padding:14px; background:#222; }
.controles button { font-size:2.4vw; padding:12px 18px; margin:5px; font-weight:bold; min-height:44px; border-radius:10px; border:none; }
.controles button:active { transform:scale(0.95); }
.aviso { position:absolute; top:20%; left:50%; transform:translateX(-50%); background:#000;
          padding:15px 30px; border-radius:12px; font-size:3vw; display:none; z-index:10; border:3px solid #ffc107; }

@media (max-width: 768px) {
.evento { font-size:6vw; letter-spacing:3px; }
.timer { font-size:14vw; }
.nombre { font-size:6vw; }
.puntos { font-size:28vw; }
.faltas-box { font-size:3.5vw; }
.faltas-box span { font-size:5.5vw; }
.botones-puntos button { font-size:5vw; }
.botones-faltas button { font-size:4vw; }
.controles button { font-size:4vw; }
.aviso { font-size:5vw; }
}
</style>
</head>
<body>
  <div class="evento">LA ZONA POINT FIGHTING</div>
  <div class="timer" id="timer">2:00</div>
  <div class="aviso" id="aviso"></div>
  <div class="container">
    <div class="jugador" id="rojo">
      <div>
        <div class="nombre">ROJO</div>
        <div class="puntos" id="puntosRojo">0</div>
        <div class="botones-puntos">
          <button class="btn-suma" onclick="sumarPunto('rojo')">+1 Punto</button>
          <button class="btn-resta" onclick="restarPunto('rojo')">-1</button>
        </div>
      </div>
      <div class="faltas-box" id="boxRojo">
        <div>Faltas: <span id="faltasRojo">0</span> | Salidas: <span id="salidasRojo">0</span></div>
        <div class="botones-faltas">
          <button class="btn-amarillo" onclick="sumarFalta('rojo')">+ F</button>
          <button class="btn-gris" onclick="restarFalta('rojo')">- F</button>
          <button class="btn-amarillo" onclick="sumarSalida('rojo')">+ S</button>
          <button class="btn-gris" onclick="restarSalida('rojo')">- S</button>
        </div>
      </div>
    </div>

    <div class="jugador" id="azul">
      <div>
        <div class="nombre">AZUL</div>
        <div class="puntos" id="puntosAzul">0</div>
        <div class="botones-puntos">
          <button class="btn-suma" onclick="sumarPunto('azul')">+1 Punto</button>
          <button class="btn-resta" onclick="restarPunto('azul')">-1</button>
        </div>
      </div>
      <div class="faltas-box" id="boxAzul">
        <div>Faltas: <span id="faltasAzul">0</span> | Salidas: <span id="salidasAzul">0</span></div>
        <div class="botones-faltas">
          <button class="btn-amarillo" onclick="sumarFalta('azul')">+ F</button>
          <button class="btn-gris" onclick="restarFalta('azul')">- F</button>
          <button class="btn-amarillo" onclick="sumarSalida('azul')">+ S</button>
          <button class="btn-gris" onclick="restarSalida('azul')">- S</button>
        </div>
      </div>
    </div>
  </div>

  <div class="controles">
    <button onclick="toggleTimer()">▶️ Start/Pausa</button>
    <button onclick="resetTodo()">🔄 Reset Total</button>
    <button onclick="ajustarTiempo(10)">+10s</button>
    <button onclick="ajustarTiempo(-10)">-10s</button>
  </div>

<script>
let datos = {
  rojo: { puntos: 0, faltas: 0, salidas: 0 },
  azul: { puntos: 0, faltas: 0, salidas: 0 }
};
let tiempo = 120;
let corriendo = false;
let timerEl = document.getElementById('timer');

function vibrar() {
  if (navigator.vibrate) navigator.vibrate(50);
}

function mostrarAviso(txt) {
  let aviso = document.getElementById('aviso');
  aviso.textContent = txt;
  aviso.style.display = 'block';
  vibrar();
  setTimeout(() => { aviso.style.display = 'none'; }, 1500);
}

function actualizar() {
  document.getElementById('puntosRojo').textContent = datos.rojo.puntos;
  document.getElementById('puntosAzul').textContent = datos.azul.puntos;
  document.getElementById('faltasRojo').textContent = datos.rojo.faltas;
  document.getElementById('salidasRojo').textContent = datos.rojo.salidas;
  document.getElementById('faltasAzul').textContent = datos.azul.faltas;
  document.getElementById('salidasAzul').textContent = datos.azul.salidas;

  document.getElementById('boxRojo').classList.toggle('alerta', datos.rojo.faltas >= 2 || datos.rojo.salidas >= 3);
  document.getElementById('boxAzul').classList.toggle('alerta', datos.azul.faltas >= 2 || datos.azul.salidas >= 3);

  let min = Math.floor(tiempo / 60);
  let seg = tiempo % 60;
  timerEl.textContent = `${min}:${seg.toString().padStart(2,'0')}`;
  timerEl.className = 'timer';
  if (corriendo) timerEl.classList.add('corriendo');
  if (tiempo === 0) timerEl.classList.add('termino');
}

function tick() {
  if (corriendo && tiempo > 0) {
    tiempo--;
    if (tiempo === 0) {
      corriendo = false;
      vibrar();
    }
    actualizar();
  }
}

function sumarPunto(equipo) { datos[equipo].puntos++; vibrar(); actualizar(); }
function restarPunto(equipo) { datos[equipo].puntos = Math.max(0, datos[equipo].puntos-1); vibrar(); actualizar(); }

function sumarFalta(equipo) {
  datos[equipo].faltas++;
  if (datos[equipo].faltas === 2) {
    let rival = equipo === 'rojo'? 'azul' : 'rojo';
    datos[rival].puntos++;
    mostrarAviso(`+1 ${rival.toUpperCase()} por 2da falta`);
  }
  vibrar();
  actualizar();
}

function restarFalta(equipo) {
  datos[equipo].faltas = Math.max(0, datos[equipo].faltas-1);
  vibrar();
  actualizar();
}

function sumarSalida(equipo) {
  datos[equipo].salidas++;
  if (datos[equipo].salidas >= 3) {
    let rival = equipo === 'rojo'? 'azul' : 'rojo';
    datos[rival].puntos++;
    mostrarAviso(`+1 ${rival.toUpperCase()} por salida`);
  }
  vibrar();
  actualizar();
}

function restarSalida(equipo) {
  datos[equipo].salidas = Math.max(0, datos[equipo].salidas-1);
  vibrar();
  actualizar();
}

function toggleTimer() { corriendo =!corriendo; vibrar(); actualizar(); }
function resetTodo() {
  datos = {
    rojo: { puntos: 0, faltas: 0, salidas: 0 },
    azul: { puntos: 0, faltas: 0, salidas: 0 }
  };
  tiempo = 120;
  corriendo = false;
  vibrar();
  actualizar();
}
function ajustarTiempo(seg) { tiempo = Math.max(0, tiempo + seg); vibrar(); actualizar(); }

document.addEventListener('dblclick', (e) => e.preventDefault());
setInterval(tick, 1000);
actualizar();
</script>
</body>
</html>
